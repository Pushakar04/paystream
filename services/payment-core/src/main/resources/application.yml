
spring:
  application:
    name: payment-core

  datasource:
    url: jdbc:mysql://localhost:3307/paystream?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: paystream
    password: paystream_pw
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      pool-name: paystream-hikari

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
        format_sql: true
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: payment-core
    version: 0.1.0-SNAPSHOT
    module: paystream
